<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Translator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons para íconos limpios y modernos -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        /* Custom Scrollbar for textareas */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8; 
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6; /* blue-500 */
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Language card hover effects */
        .lang-card {
            transition: all 0.2s ease;
        }
        .lang-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.08);
            border-color: #bfdbfe; /* blue-200 */
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="ph ph-translate text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 leading-none">Omni-Translator</h1>
                    <p class="text-xs text-gray-500 mt-1">Inglés • Español • Francés • Chino Tradicional • Filipino</p>
                </div>
            </div>
            <div>
                <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-medium">
                    <i class="ph-fill ph-sparkle"></i> IA Integrada
                </span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-8">
        
        <!-- Input Area -->
        <section class="glass-panel rounded-2xl p-1 shadow-md fade-in">
            <div class="bg-white rounded-xl p-6 relative">
                <label for="sourceText" class="block text-sm font-medium text-gray-700 mb-2 flex justify-between">
                    <span>Escribe o pega tu texto aquí (Cualquier idioma)</span>
                    <button id="clearBtn" class="text-gray-400 hover:text-red-500 transition-colors text-xs flex items-center gap-1">
                        <i class="ph ph-trash"></i> Limpiar
                    </button>
                </label>
                <textarea id="sourceText" rows="4" 
                    class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-gray-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none transition-all text-lg"
                    placeholder="Ejemplo: The quick brown fox jumps over the lazy dog..."></textarea>
                
                <div class="mt-4 flex justify-end">
                    <button id="translateBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-8 rounded-xl shadow-md hover:shadow-lg transition-all flex items-center gap-2">
                        <i class="ph ph-paper-plane-tilt text-lg"></i>
                        <span>Traducir Mágicamente</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Results Area -->
        <section id="resultsSection" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-50 pointer-events-none transition-opacity duration-300">
            
            <!-- Spanish Card -->
            <div class="lang-card glass-panel rounded-2xl p-5 border border-gray-200 flex flex-col h-64">
                <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🇪🇸</span>
                        <h3 class="font-semibold text-gray-800">Español</h3>
                    </div>
                    <button onclick="copyText('spanishOutput')" class="text-gray-400 hover:text-blue-600 transition-colors p-1" title="Copiar">
                        <i class="ph ph-copy text-lg"></i>
                    </button>
                </div>
                <div class="flex-grow relative">
                    <textarea id="spanishOutput" readonly class="w-full h-full bg-transparent resize-none outline-none text-gray-700 leading-relaxed" placeholder="La traducción aparecerá aquí..."></textarea>
                </div>
            </div>

            <!-- English Card -->
            <div class="lang-card glass-panel rounded-2xl p-5 border border-gray-200 flex flex-col h-64">
                <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🇺🇸</span>
                        <h3 class="font-semibold text-gray-800">Inglés</h3>
                    </div>
                    <button onclick="copyText('englishOutput')" class="text-gray-400 hover:text-blue-600 transition-colors p-1" title="Copiar">
                        <i class="ph ph-copy text-lg"></i>
                    </button>
                </div>
                <div class="flex-grow relative">
                    <textarea id="englishOutput" readonly class="w-full h-full bg-transparent resize-none outline-none text-gray-700 leading-relaxed" placeholder="Translation will appear here..."></textarea>
                </div>
            </div>

            <!-- French Card -->
            <div class="lang-card glass-panel rounded-2xl p-5 border border-gray-200 flex flex-col h-64">
                <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🇫🇷</span>
                        <h3 class="font-semibold text-gray-800">Francés</h3>
                    </div>
                    <button onclick="copyText('frenchOutput')" class="text-gray-400 hover:text-blue-600 transition-colors p-1" title="Copiar">
                        <i class="ph ph-copy text-lg"></i>
                    </button>
                </div>
                <div class="flex-grow relative">
                    <textarea id="frenchOutput" readonly class="w-full h-full bg-transparent resize-none outline-none text-gray-700 leading-relaxed" placeholder="La traduction apparaîtra ici..."></textarea>
                </div>
            </div>

            <!-- Traditional Chinese Card -->
            <div class="lang-card glass-panel rounded-2xl p-5 border border-gray-200 flex flex-col h-64 lg:col-span-1 md:col-span-1">
                <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🇹🇼</span>
                        <div>
                            <h3 class="font-semibold text-gray-800">Chino Tradicional</h3>
                            <span class="text-[10px] text-gray-500 uppercase tracking-wider font-semibold">Tono Poético</span>
                        </div>
                    </div>
                    <button onclick="copyText('chineseOutput')" class="text-gray-400 hover:text-blue-600 transition-colors p-1" title="Copiar">
                        <i class="ph ph-copy text-lg"></i>
                    </button>
                </div>
                <div class="flex-grow relative">
                    <textarea id="chineseOutput" readonly class="w-full h-full bg-transparent resize-none outline-none text-gray-700 leading-relaxed text-lg" placeholder="翻譯將出現在這裡..."></textarea>
                </div>
            </div>

            <!-- Filipino (Tagalog) Card -->
            <div class="lang-card glass-panel rounded-2xl p-5 border border-gray-200 flex flex-col h-64 lg:col-span-1 md:col-span-2">
                <div class="flex items-center justify-between mb-3 border-b border-gray-100 pb-2">
                    <div class="flex items-center gap-2">
                        <span class="text-2xl">🇵🇭</span>
                        <h3 class="font-semibold text-gray-800">Filipino (Tagalo)</h3>
                    </div>
                    <button onclick="copyText('tagalogOutput')" class="text-gray-400 hover:text-blue-600 transition-colors p-1" title="Copiar">
                        <i class="ph ph-copy text-lg"></i>
                    </button>
                </div>
                <div class="flex-grow relative">
                    <textarea id="tagalogOutput" readonly class="w-full h-full bg-transparent resize-none outline-none text-gray-700 leading-relaxed" placeholder="Dito lalabas ang pagsasalin..."></textarea>
                </div>
            </div>

        </section>
        
        <!-- Toast Notification Container -->
        <div id="toastContainer" class="fixed bottom-4 right-4 flex flex-col gap-2 z-50"></div>

    </main>

    <script>
        // UI Elements
        const sourceText = document.getElementById('sourceText');
        const translateBtn = document.getElementById('translateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultsSection = document.getElementById('resultsSection');
        
        const outputs = {
            english: document.getElementById('englishOutput'),
            spanish: document.getElementById('spanishOutput'),
            french: document.getElementById('frenchOutput'),
            chinese: document.getElementById('chineseOutput'),
            tagalog: document.getElementById('tagalogOutput')
        };

        // Clear functionality
        clearBtn.addEventListener('click', () => {
            sourceText.value = '';
            sourceText.focus();
            Object.values(outputs).forEach(textarea => textarea.value = '');
            resultsSection.classList.add('opacity-50', 'pointer-events-none');
        });

        // Copy to clipboard functionality
        function copyText(elementId) {
            const textarea = document.getElementById(elementId);
            if (!textarea.value || textarea.value.trim() === '') return;
            
            textarea.select();
            textarea.setSelectionRange(0, 99999); // For mobile devices

            try {
                document.execCommand('copy');
                showToast('¡Texto copiado al portapapeles!', 'success');
            } catch (err) {
                showToast('Error al copiar el texto', 'error');
            }
            // Deselect
            window.getSelection().removeAllRanges();
        }

        // Toast Notification System
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            const icon = type === 'success' ? '<i class="ph ph-check-circle"></i>' : '<i class="ph ph-warning-circle"></i>';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Remove after 3 seconds
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => {
                    container.removeChild(toast);
                }, 300); // Wait for transition to finish
            }, 3000);
        }

        async function translateText() {
            const textToTranslate = sourceText.value.trim();
            if (!textToTranslate) {
                showToast('Por favor, ingresa un texto para traducir.', 'error');
                return;
            }

            // Set Loading State
            const originalBtnContent = translateBtn.innerHTML;
            translateBtn.innerHTML = '<span class="loader"></span> Traduciendo...';
            translateBtn.disabled = true;
            translateBtn.classList.add('opacity-75', 'cursor-not-allowed');
            resultsSection.classList.remove('opacity-50', 'pointer-events-none');

            // Clear previous results and show placeholders
            Object.values(outputs).forEach(textarea => textarea.value = 'Traduciendo...');

            try {
                const apiKey = ""; // Provided by Canvas environment
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

                const systemPrompt = `
                    Eres un traductor políglota experto de clase mundial.
                    Tu tarea es recibir un texto (en cualquier idioma) y traducirlo con extrema precisión a 5 idiomas específicos:
                    Inglés, Español, Francés, Chino Tradicional y Filipino (Tagalo).
                    
                    Reglas estrictas:
                    1. Mantén la coherencia, el tono y el significado original del texto.
                    2. Para el Chino Tradicional (chinese), DEBES usar un estilo poético, elegante y respetar profundamente la manera tradicional y cultural de hablar, elevando el lenguaje sin perder el sentido original.
                    3. Para el Filipino (tagalog), asegúrate de usar gramática natural del Tagalo conversacional/formal según el contexto.
                    4. Devuelve el resultado ÚNICAMENTE en formato JSON usando la estructura solicitada.
                `;

                const payload = {
                    contents: [
                        { role: "user", parts: [{ text: textToTranslate }] }
                    ],
                    systemInstruction: {
                        parts: [{ text: systemPrompt }]
                    },
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                "english": { type: "STRING", description: "Accurate English translation" },
                                "spanish": { type: "STRING", description: "Accurate Spanish translation" },
                                "french": { type: "STRING", description: "Accurate French translation" },
                                "chinese": { type: "STRING", description: "Traditional Chinese translation, poetic, elegant, culturally accurate" },
                                "tagalog": { type: "STRING", description: "Filipino/Tagalog translation" }
                            },
                            required: ["english", "spanish", "french", "chinese", "tagalog"]
                        }
                    }
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                
                if (result.candidates && result.candidates.length > 0 && result.candidates[0].content) {
                    const jsonText = result.candidates[0].content.parts[0].text;
                    const translations = JSON.parse(jsonText);
                    
                    // Update UI with translations
                    outputs.english.value = translations.english || 'Error en traducción.';
                    outputs.spanish.value = translations.spanish || 'Error en traducción.';
                    outputs.french.value = translations.french || 'Error en traducción.';
                    outputs.chinese.value = translations.chinese || 'Error en traducción.';
                    outputs.tagalog.value = translations.tagalog || 'Error en traducción.';
                    
                    showToast('¡Traducción completada con éxito!');
                } else {
                    throw new Error("Estructura de respuesta inesperada.");
                }

            } catch (error) {
                console.error("Error durante la traducción:", error);
                showToast('Ocurrió un error al traducir. Intenta de nuevo.', 'error');
                Object.values(outputs).forEach(textarea => textarea.value = 'Fallo en la traducción.');
            } finally {
                // Restore Button State
                translateBtn.innerHTML = originalBtnContent;
                translateBtn.disabled = false;
                translateBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        // Event Listeners
        translateBtn.addEventListener('click', translateText);
        
        // Optional: Allow Ctrl+Enter to translate
        sourceText.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                translateText();
            }
        });

    </script>
</body>
</html>
